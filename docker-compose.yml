services:

  db:
    image: mysql:8
    container_name: ecommerce_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/seed.sql:/docker-entrypoint-initdb.d/seed.sql

  wordpress:
    # Use our custom build to include WP-CLI and the initialization script
    build:
      context: .
      dockerfile: ./backend/wordpress/Dockerfile
    container_name: wordpress
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-root}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-root}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
    volumes:
      - ./backend/wordpress:/var/www/html

  nextjs:
    build: ./front-end
    container_name: nextjs
    ports:
      - "3000:3000"
    depends_on:
      - wordpress
    environment:
      - WORDPRESS_URL=http://wordpress:80
      - NEXT_PUBLIC_WORDPRESS_URL=${NEXT_PUBLIC_WORDPRESS_URL:-http://localhost:8080}
      - WC_CONSUMER_KEY=${WC_CONSUMER_KEY:-your_consumer_key_here}
      - WC_CONSUMER_SECRET=${WC_CONSUMER_SECRET:-your_consumer_secret_here}
      - WP_USER=${WP_USER:-admin}
      - WP_APP_PASSWORD=${WP_APP_PASSWORD:-your_app_password_here}
      - JWT_AUTH_SECRET=${JWT_AUTH_SECRET:-your_jwt_secret_here}

volumes:
  db_data: