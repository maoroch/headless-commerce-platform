services:

  db:
    image: mysql:8
    container_name: ecommerce_db
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    networks:
      - app-network

  wordpress:
    build:
      context: .
      dockerfile: ./backend/wordpress/Dockerfile
    container_name: wordpress
    restart: always
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-root}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-root}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
    volumes:
      - ./backend/wordpress:/var/www/html
      - ./docker/assets:/docker-assets
    networks:
      - app-network

  frontend:
    build: ./front-end
    container_name: nextjs
    depends_on:
      - wordpress
    environment:
      - WORDPRESS_URL=http://wordpress:80
      # Change this to your actual production domain URL
      - NEXT_PUBLIC_WORDPRESS_URL=${NEXT_PUBLIC_WORDPRESS_URL:-http://localhost}
      - WC_CONSUMER_KEY=${WC_CONSUMER_KEY:-your_consumer_key_here}
      - WC_CONSUMER_SECRET=${WC_CONSUMER_SECRET:-your_consumer_secret_here}
      - WP_USER=${WP_USER:-admin}
      - WP_APP_PASSWORD=${WP_APP_PASSWORD:-your_app_password_here}
      - JWT_AUTH_SECRET=${JWT_AUTH_SECRET:-your_jwt_secret_here}
      - NEXT_PUBLIC_PAYPAL_CLIENT_ID=${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
      - PAYPAL_SECRET=${PAYPAL_SECRET}
    networks:
      - app-network

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      # - "443:443" # Uncomment if using SSL
    depends_on:
      - frontend
      - wordpress
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
